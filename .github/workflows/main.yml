name: generate animation

on:
  # run automatically every 24 hours
  schedule:
    - cron: "0 7 * * *" 
  
  # allows to manually run the job at any time
  workflow_dispatch:
  
  # run on every push on the master branch
  push:
    branches:
    - master
    
jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # generates a snake game from a github user (<github_user_name>) contributions graph, output a svg animation at <svg_out_path>
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark&color_snake=#ff007f
          
      # Upload directly to Cloudinary and invalidate cache for instant updates
      - name: Upload Snake to Cloudinary
        env:
          CLOUDINARY_URL: ${{ secrets.CLOUDINARY_URL }}
        run: |
          npm install -g cloudinary-cli
          cld uploader upload dist/github-contribution-grid-snake.svg \
            public_id=github-snake-animated \
            upload_preset=snake_eager \
            overwrite=true \
            invalidate=true
          
