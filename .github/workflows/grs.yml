name: Update README cards

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
  
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Minimal Stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&theme=radical&hide_border=true&count_private=true&include_all_commits=true&hide=issues,prs
          path: profile/stats.svg
          token: ${{ secrets.GH_PAT }}

      - name: Generate Top Langs card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&theme=radical&hide_border=true&layout=compact
          path: profile/top-langs.svg
          token: ${{ secrets.GH_PAT }}

      - name: Generate Clippy Pin
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=clippy&theme=radical&hide_border=true
          path: profile/clippy.svg
          token: ${{ secrets.GH_PAT }}

      - name: Generate Chunkware Pin
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          # Dopasowane bezpośrednio do organizacji chunkware i repozytorium website, które wskazałeś w linku
          options: username=chunkware&repo=website&theme=radical&hide_border=true
          path: profile/chunkware.svg
          token: ${{ secrets.GH_PAT }}

      - name: Generate Kznlabs Pin
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=kznlabs&theme=radical&hide_border=true
          path: profile/kznlabs.svg
          token: ${{ secrets.GH_PAT }}

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
